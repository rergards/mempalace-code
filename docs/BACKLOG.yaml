  - key: MINE-HCL-BOUNDARY-MODERN
    summary: Extend HCL_BOUNDARY to cover Terraform 1.1+ block types (moved, import, check, removed)
    type: task
    status: open
    priority: low
    size: S
    section_id: coding_first
    labels: [mining, chunking, devops]
    description: |-
      ## Problem

      HCL_BOUNDARY regex covers only Terraform 0.x/1.0 block types: resource, data, module, variable, output, locals, provider, terraform. Terraform 1.1+ introduced new top-level blocks that will not be used as chunk split points:
      - moved {} (Terraform 1.1)
      - import {} (Terraform 1.5)
      - check {} (Terraform 1.5)
      - removed {} (Terraform 1.7)

      When a .tf file contains only these newer blocks, chunk_code falls back to chunk_adaptive_lines, which still works but produces less semantically clean splits for large moved/import blocks.

      ## Scope

      mempalace/miner.py — HCL_BOUNDARY regex and its test in tests/test_chunking.py

      ## Deliverable

      Add moved, import, check, removed to HCL_BOUNDARY pattern.

      ## Acceptance Criteria

      1. HCL_BOUNDARY pattern includes moved, import, check, removed keywords
      2. A .tf file with moved {} blocks splits at each moved boundary
      3. All existing Terraform tests continue to pass
      4. ruff clean

      ## Constraints

      - No tree-sitter needed — simple regex extension
      - Don't break .tfvars handling (still falls back to chunk_adaptive_lines when no boundaries match)
