  - key: ARCH-EXTRACTION-WING-SCOPE
    summary: "Scope architecture pass invalidation to the current wing instead of a global KG sweep"
    type: task
    status: open
    priority: low
    size: S
    section_id: future
    labels: [kg, architecture, multi-wing]
    description: "## Problem\n\nThe architecture extraction pass in mempalace_code/miner.py:3589 calls kg.invalidate_by_predicates(ARCH_PREDICATES) before re-emitting facts. This globally expires every active is_pattern, is_layer, in_namespace, and in_project triple in the shared KG, regardless of which wing produced it. Mining wing A and then wing B in sequence wipes wing A's arch facts during B's mine; they are only re-emitted when wing A is itself re-mined. mine-all happens to re-mine every wing in turn so it self-heals, but standalone sequential single-wing mines lose cross-wing facts until each wing is touched again.\n\nThe namespace->project sentinel (_NS_PROJECT_SENTINEL = '__arch_ns_project__') is shared across wings too, so namespace->in_project edges are equally vulnerable.\n\n## Scope\n\nmempalace_code/miner.py architecture pass invalidation, mempalace_code/architecture.py namespace-project sentinel handling, and mempalace_code/knowledge_graph.py invalidation helpers. Tests in tests/test_architecture_extraction.py.\n\n## Deliverable\n\nEither (a) scope arch invalidation by source_file prefix matching the current project_path plus the per-wing slice of the namespace sentinel, or (b) extend the KG schema with a wing column and filter invalidation/queries by wing. Either approach should preserve the current behaviour where arch facts for files deleted from the working set are expired.\n\n## Acceptance Criteria\n\n- [ ] Mining wing A then wing B back-to-back leaves wing A's is_pattern, is_layer, in_namespace, in_project facts current.\n- [ ] Mining wing A, deleting a wing-A source file, and re-mining wing A still expires the deleted file's arch facts.\n- [ ] Mining wing A with default config then re-mining with architecture.enabled: false still expires wing A's arch facts (existing F-1 regression continues to pass).\n- [ ] Tests cover all three scenarios and would fail if the wing scoping regressed.\n\n## Constraints\n\n- Must not regress test_disabling_architecture_expires_prior_facts (round-1 F-1 regression).\n- Must not require schema migration for users who have not adopted multi-wing palaces; if a wing column is added, fall back to behaviour-equivalent global sweep when the column is null.\n\nIdentified in ARCH-EXTRACTION-MODE harden round-1 (F-2)."
