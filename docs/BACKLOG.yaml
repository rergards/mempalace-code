  - key: MINE-BATCH-UPSERT-CONTENT-UPDATE-TEST
    summary: Add test verifying add_drawers_batch updates stored content on re-upsert with changed content
    type: task
    status: open
    priority: low
    size: XS
    section_id: quality
    labels: [test, mining, storage]
    description: |-
