  - key: CI-CHROMA-COMPAT-TESTS
    summary: "Add ChromaStore-specific tests so the chroma-compat CI job actually validates ChromaDB"
    type: task
    status: open
    priority: low
    size: S
    section_id: quality
    labels: [ci, testing, storage]
    description: |-
      ## Problem
      The chroma-compat CI job installs .[dev,chroma] then runs the full test suite, but most tests use open_store() with LanceDB. The job mostly proves chromadb imports, not that ChromaStore works.

      ## Scope
