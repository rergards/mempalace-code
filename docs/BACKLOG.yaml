      but does not test the CLI dispatch path: cmd_backup(args) and cmd_restore(args).
      The argparse wiring, sys.exit(1) on error, and the returned out_path display are untested.

      ## Scope

      Add CLI dispatch tests for backup and restore commands, either in tests/test_backup.py or a new tests/test_backup_cli.py.

      ## Deliverable

      Add tests to tests/test_backup.py (or a new tests/test_backup_cli.py) that invoke
      cmd_backup and cmd_restore through argparse using a minimal Namespace mock or by
      calling main() with a fake argv list.

      ## Acceptance criteria

      1. test_backup_cli_default_out: call cmd_backup with args.palace=seeded_palace, args.out=None;
         assert a .tar.gz file is created in CWD and the printed "Archive:" line shows the real path.
      2. test_backup_cli_explicit_out: call cmd_backup with args.out=explicit_path;
         assert file exists at that path.
      3. test_restore_cli_happy: call cmd_restore with args.archive=backup_file, args.force=False;
