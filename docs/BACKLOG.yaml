      ## Deliverable

      Add test_add_drawers_batch_updates_content to tests/test_miner.py:
      1. Call add_drawers_batch with content "v1" for a drawer ID.
      2. Call add_drawers_batch again with content "v2" for the same drawer ID.
      3. Query the store and assert the stored text equals "v2".

      ## Scope

      tests/test_miner.py only.

      ## Acceptance criteria

      - test_add_drawers_batch_updates_content passes with current implementation
      - Test would fail if merge_insert did not call when_matched_update_all (remove it to verify)
      - All existing 40 miner tests continue to pass
      - ruff clean

      ## Constraints

      No production code changes needed. Test only. Identified in MINE-BATCH-EMBED-DEDUP-UPSERT harden round-1 (F-1).
