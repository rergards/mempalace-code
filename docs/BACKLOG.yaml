# ============================================================
# BACKLOG.yaml — Machine-readable project backlog
# Format: sections + items (DH2-style)
# Parse:  backlog list --status open --file docs/BACKLOG.yaml
# ============================================================
#
# project: mempalace-code

sections:
  - id: immediate
    order: 1
    title: "IMMEDIATE — Foundation & Project Setup"
    description: "Fork identity, CI, docs. Must be done before any feature work."
  - id: pre_release
    order: 2
    title: "PRE-RELEASE — v1.0 Blockers (Autopilot Pass)"
    description: "P0 and P1 items that must land before a public v1.0. All items here are autopilot-ready — owner decisions already made. Batch in one large autopilot pass. Items needing owner judgment live in other sections."
  - id: coding_first
    order: 3
    title: "CODING-FIRST — Smart Code Mining"
    description: "Language-aware chunking, structural boundaries, code-optimized search. The core differentiator."
  - id: storage_reliability
    order: 4
    title: "STORAGE & RELIABILITY"
    description: "LanceDB hardening, migration tooling, backup/restore."
  - id: mcp_developer_tools
    order: 5
    title: "MCP — Developer-Focused Tools"
    description: "New and improved MCP tools for coding workflows."
  - id: cleanup
    order: 6
    title: "CLEANUP — De-emphasize Dialog-First Features"
    description: "Refactor or gate conversation-centric modules. Keep functional but not default."
  - id: quality
    order: 7
    title: "QUALITY — Tests, Benchmarks, CI"
    description: "Test coverage, code-mining benchmarks, CI hardening."
  - id: future
    order: 8
    title: "FUTURE — Post-v1 Ideas"
    description: "Ideas for after the first public release."
# ============================================================
# OPEN ITEMS
# ============================================================
items:
  # ── CLEANUP — De-emphasize Dialog-First Features ────────────
  - key: CLEAN-SPELLCHECK
    summary: "Disable spellcheck by default for code mining"
    type: task
    priority: low
    status: open
    size: S
    section_id: cleanup
    labels: [cleanup, mining]
    description: >-
      ## Problem

      spellcheck.py corrects user messages before filing. Makes sense for conversation text, but for code mining it mangles CamelCase, snake_case, and technical terms (e.g., 'kubectl' -> 'cubectl').

      ## Scope

      - Add a config flag (e.g. `spellcheck_enabled: false` in mempalace.yaml or MempalaceConfig)

      - Default to disabled when mining code files (`--mode code`, or default mode)

      - Keep enabled for conversation mining (`--mode convos`)

      - Respect explicit override: `--spellcheck` / `--no-spellcheck` CLI flags

      ## Acceptance Criteria

      - [ ] Code mining does not run spellcheck by default

      - [ ] Conversation mining still runs spellcheck by default

      - [ ] CLI flag `--no-spellcheck` / `--spellcheck` overrides the default

      - [ ] Config file option works

      - [ ] Tests for: code mine skips spellcheck, convo mine runs it, flag override
    resolution: null
  - key: CLEAN-ONBOARDING
    summary: "Replace interactive onboarding with config-file-first setup"
    type: task
    priority: medium
    status: open
    size: M
    section_id: cleanup
    labels: [cleanup, ux]
    description: |-
      ## Problem
      Current onboarding.py is a guided interview (mode: work/personal/combo, people, projects, wing taxonomy). Coding users want zero-friction setup driven by the project directory.

      ## Scope
      Replace the default setup path with `mempalace init <dir>` reading project structure and generating mempalace.yaml automatically. Interactive prompts should remain available only as an explicit opt-in path.

      ## Acceptance criteria
      - `mempalace init <dir>` can generate a usable mempalace.yaml without an interview.
      - Interactive onboarding is not the default for code projects.
      - Existing prompt-based onboarding remains reachable for users who request it.
      - Tests cover default config generation and opt-in interactive behavior.
    resolution: null
  - key: CLEAN-EMOTION-EXTRACT
    summary: "Remove EMOTIONAL category from general_extractor defaults"
    type: task
    priority: low
    status: open
    size: S
    section_id: cleanup
    labels: [cleanup, mining]
    description: |-
      ## Problem
      general_extractor.py classifies memories into DECISIONS, PREFERENCES, MILESTONES, PROBLEMS, EMOTIONAL. The EMOTIONAL category is conversation-first and noisy for code-focused mining.

      ## Scope
      Remove EMOTIONAL from the default extraction categories while keeping it available as an opt-in for users who mine conversations.

      ## Acceptance criteria
      - Default general extraction does not emit EMOTIONAL memories.
      - Conversation-focused users can explicitly enable emotional extraction.
      - Tests cover default extraction and the opt-in path.
    resolution: null
  - key: QUAL-CODE-BENCH
    summary: "Code mining benchmark — measure retrieval quality on real repos"
    type: feature
    priority: medium
    status: open
    size: L
    section_id: quality
    labels: [benchmarks, testing]
    description: |-
      ## Problem
      Upstream benchmarks (LongMemEval, LoCoMo) test conversation retrieval, not codebase retrieval. The fork needs a benchmark that measures whether code mining answers developer questions well.

      ## Scope
      Build a code-specific benchmark: mine a known repo, ask code questions such as where a function lives, what a module does, and how a feature works. Measure retrieval accuracy and compare naive chunking, smart chunking, and tree-sitter chunking.

      ## Acceptance criteria
      - Benchmark dataset includes known-answer code questions against at least one pinned real repo.
      - Results report R@5/R@10 and enough metadata to diagnose misses.
      - Benchmark compares at least two chunking strategies.
      - README or benchmarks docs explain how to reproduce the run.
    resolution: null
  - key: QUAL-RUFF-STRICT
    summary: "Enable stricter ruff rules"
    type: task
    priority: low
    status: open
    size: S
    section_id: quality
    labels: [quality, lint]
    description: |-
      ## Problem
      Current ruff config is minimal, so style and maintainability regressions can land without CI catching them.

      ## Scope
      Enable stricter ruff rules such as type-checking-related rules, import sorting, docstring conventions where appropriate, and unused variable detection. Fix existing violations and add the stricter check to CI.

      ## Acceptance criteria
      - pyproject.toml enables the agreed stricter ruff rule set.
      - Existing violations are fixed or explicitly ignored with justification.
      - CI runs the stricter ruff check.
      - Local `ruff check` passes.
    resolution: null
  # ── FUTURE — Post-v1 Ideas ─────────────────────────────────
