  - key: STORE-WHERE-ARROW-OPS
    summary: _where_to_arrow_mask silently ignores operator dicts — iter_all() returns wrong rows
    type: task
    status: open
    priority: medium
    size: S
    section_id: storage_reliability
    labels: [storage, bug]
    description: |-
      ## Problem

      iter_all(where={'chunk_index': {'$gt': 1}}) returns ALL rows because _where_to_arrow_mask (storage.py) only handles simple equality. Operator dicts ($gt, $gte, $lt, $lte, $ne) are silently skipped, producing no filter. Confirmed by manual test: 3 rows returned when 2 were expected.

      ## Deliverable

      Fix _where_to_arrow_mask to handle numeric comparison operators via pyarrow.compute (pc.greater, pc.less_equal, etc.), mirroring _where_to_sql semantics.

      ## Acceptance criteria

      1. _where_to_arrow_mask handles $gt, $gte, $lt, $lte, $ne operator dicts for numeric fields
      2. iter_all(where={'chunk_index': {'$gt': 1}}) returns only rows with chunk_index > 1
      3. Regression test added to test_storage_lance.py::TestIterAll

      ## Constraints

      - Arrow compute ops must work for both int32 and float32 columns
      - No behavioral change to the string equality case already working
