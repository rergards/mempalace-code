  - key: PY-MULTI-IMPORT
    summary: Handle multi-module import lines (import os, sys) in Python KG extraction
    type: task
    status: open
    priority: low
    size: S
    section_id: quality
    labels: [mining, kg, python]
    description: |-
      ## Problem

      _python_type_rels() uses _PY_IMPORT_RE which captures only the first module on a multi-module import line (e.g. 'import os, sys' yields only 'os', missing 'sys'). This is uncommon in idiomatic Python but can occur in legacy or third-party code.

      ## Scope

      Fix _PY_IMPORT_RE to capture all comma-separated module names on a single import line.

      ## Acceptance Criteria

      - [ ] extract_type_relationships on 'import os, sys\n' returns both (module, depends_on, os) and (module, depends_on, sys)
      - [ ] Existing tests for single imports still pass
      - [ ] ruff check passes

      ## Constraints

      Identified in PY-TYPE-KG hardening round-1 (F-2). Low priority -- multi-module imports are uncommon in modern Python.
  - key: MINE-K8S-YAML-SEPARATOR
    summary: K8s chunker false splits on '---' inside YAML block scalar values
    type: bug
    status: open
    priority: low
    size: S
    section_id: coding_first
    labels: [fix, miner, infra]
    description: |-
      ## Symptom
      _chunk_k8s_manifest splits on the regex (?:^|\n)---\s*(?:\n|$) which matches any --- at a line boundary, including --- inside YAML block scalars (|, >) in ConfigMap/Secret data fields. A ConfigMap with an embedded config file containing --- would be incorrectly split.

      ## Steps to reproduce
      1. Create a ConfigMap with a block scalar under data containing a line with `---`.
      2. Run K8s manifest chunking on the file.
      3. Observe the ConfigMap split as though the embedded separator were a YAML document separator.

      ## Scope
      - _chunk_k8s_manifest in miner.py: guard against splitting inside YAML block scalar values
      - Add a test with a ConfigMap whose data contains an embedded --- separator

      ## Acceptance Criteria
      - [ ] ConfigMap with data containing embedded --- is stored as a single chunk
      - [ ] Multi-document YAML files with real --- separators continue to produce one chunk per document
