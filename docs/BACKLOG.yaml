  - key: STORE-CHROMA-COUNTBY-FALLBACK
    summary: "ChromaStore.count_by/count_by_pair silently return empty when deprecated ChromaDB backend is used"
    type: bug
    status: open
    priority: low
    size: S
    section_id: storage_reliability
    labels: [storage, chroma, hardening]
    description: >
      After STORE-STATUS-LIMIT, ChromaStore.count_by and count_by_pair raise NotImplementedError. MCP tools (tool_status, tool_list_wings, tool_list_rooms, tool_get_taxonomy) wrap these calls in try/except Exception: pass, so ChromaDB palaces silently report wings={}, rooms={} even though drawers exist. This is a regression from pre-fix behavior (ChromaDB returned truncated but non-empty results). Fix: implement get-and-iterate fallback in ChromaStore.count_by using self.get(include=["metadatas"], limit=self.count()) — similar to the old approach but with the correct upper bound. Acceptance criteria: tool_list_wings on a ChromaDB palace with N drawers across M wings returns all M wings. Note: ChromaDB is deprecated — this is a stop-gap until STORE-MIGRATION-CLI lands.

    resolution: null
  - key: MINE-LANCE-VECTOR-SCAN
    summary: get_source_files() loads full table including vector column before projecting to two columns
    type: bug
    status: open
    priority: low
    size: S
    section_id: storage_reliability
    labels: [mining, performance, storage]
    description: 'LanceStore.get_source_files() calls self._table.to_arrow().select([''source_file'',''wing'']). to_arrow() without column arguments materializes ALL columns — including the large vector column (384 floats per row) — before the .select() projection discards everything except two string columns. For a palace with 5,000 drawers, this loads ~7MB of vector data into memory unnecessarily. The same pattern exists in count_by(), count_by_pair(), and get_source_file_hashes() (added in CODE-INCREMENTAL). Fix: pass a columns argument to to_arrow() or use the LanceDB scanner API for column-projected scans. Acceptance criteria: (1) get_source_files() and get_source_file_hashes() on a 5,000-drawer table each read less than 1MB of data (verified via LanceDB IO stats or a profiler); (2) all existing tests pass; (3) ruff clean; (4) the fix also applies to count_by() and count_by_pair() for consistency. Identified in MINE-LANCE-COMPACT harden round-1 (F-002); scope extended in CODE-INCREMENTAL harden round-1 (F-002).'
