  - key: MINE-EAGER-EMBED-INIT
    summary: "Force eager embedding model init during 'Loading embedding model...' phase"
    type: task
    status: open
    priority: low
    size: XS
    section_id: coding_first
    labels: [mining, devex]
    description: >
      LanceDB lazily initializes the sentence-transformers model on first embed call, not at store open time. This causes the "Loading weights" output from HuggingFace to appear mid-batch during flush_batch() instead of during the "Loading embedding model..." phase. Fix: after get_collection() in mine(), call a dummy embed (e.g. store._embed(["warmup"])) to force model initialization. AC: all model loading output appears between "Loading embedding model..." and "Model ready."; no HF output during batch embedding.

    resolution: null
