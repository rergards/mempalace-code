    description: |-
      ## Problem

      MINE-DEVOPS-INFRA added scan_project integration tests for Terraform, Dockerfile, and Makefile, but the following new file types have no scan_project test:
      - Jinja2 templates (.j2, .jinja2)
      - Config files (.conf, .cfg, .ini)
      - Make include files (.mk)
      - Containerfile (extensionless, maps to dockerfile)
      - Vagrantfile (extensionless, maps to ruby)

      These are covered by unit tests in test_lang_detect.py, but there are no integration-level tests confirming they flow through scan_project correctly.

      ## Scope

      tests/test_miner.py — new test functions using tempdir pattern

      ## Deliverable

      Additional test functions in tests/test_miner.py verifying each missing type appears in scan_project output.

      ## Acceptance Criteria

      1. test_scan_project_includes_jinja2_files — .j2 and .jinja2 files appear in scan results
      2. test_scan_project_includes_config_files — .conf, .cfg, .ini files appear in scan results
      3. test_scan_project_includes_mk_files — .mk files appear in scan results
      4. test_scan_project_includes_containerfile — Containerfile appears in scan results
      5. test_scan_project_includes_vagrantfile — Vagrantfile appears in scan results
      6. All tests pass

      ## Constraints

      - Tests must use tempfile.mkdtemp() + shutil.rmtree() pattern (no pytest fixtures)
      - No palace/embedding needed — pure scan_project() call tests
