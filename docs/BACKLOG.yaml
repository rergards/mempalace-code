  - key: CLI-DIARY-WRITE-ID-COLLISION
    summary: Use UUID for diary entry IDs to prevent same-second collision
    type: bug
    status: open
    priority: low
    size: XS
    section_id: mcp_developer_tools
    labels: [cli, diary, mcp]
    description: 'diary write (cli.py cmd_diary_write) and tool_diary_write (mcp_server.py) both generate IDs using second-precision timestamps plus an 8-char MD5 suffix of the first 50 content chars. Two writes at the same second with identical first 50 chars produce the same ID, causing store.add() to raise a duplicate-ID error. Replace the ID formula in both sites with uuid.uuid4() to guarantee uniqueness. Deliverable: update cmd_diary_write and tool_diary_write atomically; update tests that assert on ID format if any. Constraints: keep all other metadata fields unchanged. AC: (1) two diary writes in the same second with identical content both succeed without error; (2) each produces a distinct ID; (3) all existing diary write tests pass; (4) ruff clean.'
