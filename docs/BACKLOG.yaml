items:
  - key: CLI-READ-SOURCE-PATH-DISCOVERY
    summary: "Make CLI search/read source paths usable together"
    type: bug
    priority: high
    status: open
    size: M
    section_id: mcp_developer_tools
    labels: [cli, read, search, real-usage]
    description: |
      ## Symptom
      CLI `read` requires the exact stored `source_file`, but CLI `search` prints only `Source: auth.py`.

      ## Steps to reproduce
      Mine a temp project on macOS, run `mempalace-code search "stored credential lookup" --wing manual_wing`, then try `mempalace-code read auth.py --start 1 --end 6 --wing manual_wing`.

      ## Expected vs actual
      Expected: search output gives a path that can be copied into `read`, or `read` accepts the visible source value when unique.
      Actual: `read auth.py` returned `not_found`; the apparent `/var/...` absolute path also failed, while MCP `code_search` revealed the stored `/private/var/.../auth.py` path and MCP `read` succeeded.

      ## Root cause hypothesis
      CLI search shortens `source_file` to basename and CLI read does exact string matching with no basename/project-relative lookup or macOS `/var` path normalization.

      ## Acceptance criteria
      - CLI search exposes the exact stored `source_file` needed by CLI read, or offers a machine-readable mode that does.
      - CLI read accepts a unique basename/project-relative path within a wing, or emits candidates when the input is ambiguous.
      - macOS `/var/...` and `/private/var/...` equivalents are normalized or clearly handled.
  - key: MCP-KG-SOURCE-FILE-PROVENANCE
    summary: "Expose KG source_file provenance in query outputs"
    type: feature
    priority: medium
    status: open
    size: S
    section_id: mcp_developer_tools
    labels: [mcp, kg, provenance, real-usage]
    description: |
      ## Problem
      KG provenance is write-only in the current MCP surface: callers can pass `source_file`, but cannot see it in normal KG query results.

      ## Scope
      `mempalace_kg_add` accepts `source_file`, but `mempalace_kg_query` and timeline-style outputs omit it, so users cannot trace KG facts back to the file that produced them.

      Real MCP evidence from 2026-05-24: added `AuthService implements IAuthService` with `source_file='src/auth.py'`; subsequent `mempalace_kg_query` facts included `source_closet` but not `source_file`.

      ## Non-goals
      Do not change KG storage format beyond exposing already stored provenance fields.

      ## Acceptance criteria
      - `mempalace_kg_query` includes `source_file` when present.
      - `mempalace_kg_timeline` and relationship/project graph outputs include provenance where they expose fact rows.
      - Existing rows without `source_file` remain backward-compatible.

      ## Files to touch
      - `mempalace_code/knowledge_graph.py`
      - `mempalace_code/mcp/tools/kg.py`
      - Architecture/KG MCP tool tests as needed.
  - key: MIGRATE-STORAGE-REAL-USAGE-FIXTURE
    summary: "Add a disposable real migrate-storage smoke fixture"
    type: task
    priority: low
    status: open
    size: S
    section_id: quality
    labels: [migration, smoke-test, release]
    description: |
      ## Scope
      The 2026-05-24 release sweep could only exercise the real `migrate-storage` optional/error path locally. There is no small packaged/disposable Chroma source palace or runbook for end-to-end manual migration verification.

      ## Acceptance criteria
      - Provide a tiny legacy Chroma fixture or documented fixture-generation command gated by the `[chroma]` extra.
      - Document the manual end-to-end migrate-storage smoke command for release checks.
      - The smoke verifies source count, destination count, and searchable migrated drawers.
  - key: MCP-DELETE-NO-EMBEDDER-AFTER-READ
    summary: "Make MCP delete tools avoid embedder startup after read-only cache"
    type: bug
    status: open
    priority: high
    size: S
    section_id: mcp_developer_tools
    labels: [mcp, delete, read-only, real-usage]
    description: |
      ## Symptom
      After an MCP read tool opens the cached store read-only, `mempalace_delete_drawer` upgrades to a write-capable handle. Real stdio testing showed it initializes the sentence-transformers embedder, emits HF/model noise, and fails as `No palace found` in an offline fresh HOME even though deleting an existing drawer should not require embeddings.

      ## Steps to reproduce
      Seed a Lance palace, start `python -m mempalace_code.mcp_server --tools status,delete_drawer` with `MEMPALACE_PALACE_PATH=<palace>`, fresh `HOME`, `HF_HUB_OFFLINE=1`, and `TRANSFORMERS_OFFLINE=1`; call `mempalace_status`, then `mempalace_delete_drawer` for an existing id.

      ## Expected vs actual
      Expected: delete succeeds without model startup and without HF/sentence-transformers output.
      Actual: delete returns `No palace found` offline; with normal HOME it succeeds but emits HF/sentence-transformers model-loading noise.

      ## Root cause hypothesis
      `runtime._get_store(create=True)` reopens `LanceStore` in write mode, and the write-mode open path eagerly initializes the embedder for schema setup even when the operation only needs metadata/delete access.

      ## Acceptance criteria
      - `mempalace_delete_drawer` after `mempalace_status` deletes an existing drawer in an offline fresh HOME.
      - `mempalace_delete_wing` has the same behavior for an existing wing.
      - Delete paths do not emit HF/sentence-transformers model-loading output.
      - Write operations that actually add/upsert documents still initialize embeddings as needed.
  - key: CLI-BACKUP-PARENT-OUT-IGNORED
    summary: "Honor documented backup --out FILE create compatibility form"
    type: bug
    status: open
    priority: medium
    size: S
    section_id: storage_reliability
    labels: [cli, backup, real-usage]
    description: |
      ## Symptom
      `mempalace-code backup --out FILE create` is documented in the parser comment as a backward-compatible form, but real CLI testing wrote to the default backups directory instead of FILE. The subcommand form `mempalace-code backup create --out FILE` does work.

      ## Steps to reproduce
      Run `mempalace-code --palace <temp-palace> backup --out /tmp/expected.tar.gz create` on a small Lance palace.

      ## Expected vs actual
      Expected: the archive is written to `/tmp/expected.tar.gz`, or the old form is rejected/removed from help and comments.
      Actual: command exits 0 but writes `<palace-parent>/backups/mempalace_backup_<ts>.tar.gz`; `/tmp/expected.tar.gz` is not created.

      ## Root cause hypothesis
      Both the parent `backup` parser and `backup create` subparser define `--out` with the same destination, and the subparser default overwrites the parent value with `None`.

      ## Acceptance criteria
      - `backup --out FILE create` writes FILE, or the form is intentionally removed/rejected with clear help.
      - `backup create --out FILE` continues to work.
      - Add a CLI regression test for both accepted forms or for the explicit rejection.
