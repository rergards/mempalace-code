  - key: EXPLAIN-NRESULTS-CLAMP
    summary: Clamp n_results in tool_explain_subsystem and add boundary tests
    type: task
    status: open
    priority: low
    size: S
    section_id: mcp_developer_tools
    description: |-
      ## Problem

      tool_explain_subsystem uses n_results directly in both code_search(n_results=n_results*2) and entry_points[:n_results] without input validation. code_search() in searcher.py already applies max(1, min(50, n)) before use, but the MCP handler does not mirror this guard. For n_results=0, entry_points[:0] silently returns an empty list. For n_results<0, Python slice semantics (e.g. list[:-1] removes the last element) produce wrong results with no error. No crash occurs, but callers receive incorrect output for out-of-range inputs without any diagnostic.

      ## Scope

      1. Add n_results = max(1, min(50, n_results)) at the top of tool_explain_subsystem (before the code_search call), mirroring the guard in code_search itself.
      2. Add test_explain_subsystem_n_results_limit to TestExplainSubsystem: seed 5 code drawers, call with n_results=1, assert len(entry_points) == 1.
      3. Add test_explain_subsystem_n_results_zero: call with n_results=0, assert result does not contain an error key and len(entry_points) <= 1 (clamped to 1).

      ## Acceptance Criteria

      - [ ] n_results=0 is clamped to 1, not silently returning empty
      - [ ] n_results=-1 does not produce slice-from-end behavior
      - [ ] n_results=1 returns exactly 1 entry_point when results exist
      - [ ] ruff check passes
      - [ ] All existing TestExplainSubsystem tests still pass
  - key: EXTRACT-REUSABLE-REFERENCES-PROJECT-GLUE
    summary: 'Extract reusable: promote glue when entity references_project a platform project'
    type: feature
    status: open
    priority: low
    size: S
    section_id: mcp_developer_tools
    description: |-
      ## Problem

      Step 3 glue-promotion in mempalace_extract_reusable checks only depends_on predicates for platform dependencies. An entity that implements a core interface AND references_project a platform-classified project (e.g., a WPF project targeting net8.0-windows) is incorrectly classified as core instead of glue.

      In .NET solutions, project references (references_project) are first-class coupling signals, equivalent to NuGet package references (depends_on). Ignoring them causes false-negative glue detection when the platform coupling arrives through a project reference rather than a direct package reference.

      ## Scope

      Extend the platform_deps check in step 3 to include references_project edges alongside depends_on. An entity qualifies as glue if it (a) implements a core-classified interface AND (b) depends_on OR references_project a platform-classified entity.

      ## Acceptance Criteria

      - [ ] Entity that implements a core-classified interface AND references_project a platform-classified project is promoted to glue
      - [ ] platform_deps output list includes project-level platform references (not just package references)
      - [ ] Existing 12 TestExtractReusable tests pass unchanged
      - [ ] At least one new test covers the references_project -> glue promotion path

      ## Origin

      LOGIC-EXTRACTION hardening round-1 F-2.
