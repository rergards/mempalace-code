  - key: STORAGE-BACKUP-RETENTION
    summary: 'Backup retention policy: auto-prune pre_optimize_*.tar.gz archives so they don''t accumulate indefinitely'
    type: task
    status: open
    priority: medium
    size: S
    section_id: storage_reliability
    labels: [feat, storage, hardening]
    description: |-
      ## Problem
      safe_optimize() creates pre_optimize_YYYYMMDD_HHMMSS.tar.gz archives in <palace_parent>/backups/ before each optimize run. Currently there is no cleanup — archives accumulate forever, which will silently fill disk on long-running installations.

      ## Deliverable
      A configurable retention policy (e.g. keep last N backups, or delete archives older than D days) applied at the end of safe_optimize() after a successful optimize. Default: keep last 5 archives (or 0 = keep all, for backwards compatibility).

      ## Acceptance Criteria
      - [ ] New config option (e.g. backup_retain_count: 5) read from MempalaceConfig; env var MEMPALACE_BACKUP_RETAIN_COUNT overrides it.
      - [ ] After safe_optimize() succeeds with backup_first=True, archives beyond the retention limit are deleted (oldest first).
      - [ ] backup_retain_count=0 disables pruning (default for backwards compat).
      - [ ] Unit test: after N+1 successful optimize calls with backup_first=True, only N archives remain under backups/.
      - [ ] Pruning errors are logged at WARNING level and do not cause safe_optimize to return False.

      ## Constraints
      - Only prune pre_optimize_*.tar.gz files in the backups/ directory — do not touch other files.
      - Retention applies per-palace, not globally.
  - key: HEALTH-SCAN-PROJECTION
    summary: health_check Probe 3 uses to_arrow() loading all rows; switch to column-projected scanner
    type: task
    status: open
    priority: low
    size: S
    section_id: storage_reliability
    labels: [storage, performance, hardening]
    description: |-
      ## Problem
      health_check() Probe 3 calls self._table.to_arrow().select(["wing","room"]) to detect fragment corruption. to_arrow() without column arguments materializes ALL columns — including the 384-float vector column — before the select() projection discards them. For a palace with 5,000 drawers this loads ~7MB of vector data into memory unnecessarily and may time out on very large palaces.

      ## Scope
      mempalace/storage.py — health_check() Probe 3 and the matching probe in recover_to_last_working_version().

      ## Deliverable
      Replace to_arrow().select(["wing","room"]) with a LanceDB scanner call that projects columns at scan time: self._table.scanner(columns=["wing","room"]).to_table(). Apply the same fix to the version-walk probe in recover_to_last_working_version().

      ## Acceptance criteria
      1. health_check() Probe 3 no longer materializes the vector column
      2. All 571+ existing tests pass unchanged
      3. ruff clean
      4. Fix is consistent with MINE-LANCE-VECTOR-SCAN in count_by/count_by_pair

      ## Constraints
      - Must preserve the exact corruption detection semantics (still scans all fragments)
      - Identified in FIX-LANCE-CORRUPT harden round-1 (F-4)
