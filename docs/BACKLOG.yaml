  - key: MINE-MULTI-INCLUDE-IGNORED-TEST
    summary: Add test verifying --include-ignored comma-splitting and pass-through in mine-all
    type: task
    status: open
    priority: low
    size: S
    section_id: quality
    labels: [testing, cli]
    description: |-
      ## Problem

      The mine-all command splits --include-ignored values on commas before forwarding them to mine(). This logic is untested: no test asserts that --include-ignored path1,path2 results in mine() receiving ['path1', 'path2']. A regression here would silently drop user-specified paths from the scan.

      ## Scope

      Add one test in TestMineAllCommand (tests/test_cli.py) that passes --include-ignored with a comma-separated value and asserts the split list is forwarded to mine(). No production code changes required.

      ## Acceptance Criteria

      - Test passes --include-ignored 'pathA,pathB' to mine-all
      - Asserts mine() was called with include_ignored=['pathA', 'pathB']
      - No real mining occurs (mine() is mocked)

      ## Constraints

      - Test must use mock.patch on mempalace_code.miner.mine and inspect call kwargs
  - key: PY-MULTI-IMPORT
    summary: Handle multi-module import lines (import os, sys) in Python KG extraction
    type: task
    status: open
    priority: low
    size: S
    section_id: quality
    labels: [mining, kg, python]
    description: |-
      ## Problem

      _python_type_rels() uses _PY_IMPORT_RE which captures only the first module on a multi-module import line (e.g. 'import os, sys' yields only 'os', missing 'sys'). This is uncommon in idiomatic Python but can occur in legacy or third-party code.

      ## Scope

      Fix _PY_IMPORT_RE to capture all comma-separated module names on a single import line.

      ## Acceptance Criteria

      - [ ] extract_type_relationships on 'import os, sys\n' returns both (module, depends_on, os) and (module, depends_on, sys)
      - [ ] Existing tests for single imports still pass
      - [ ] ruff check passes

      ## Constraints

      Identified in PY-TYPE-KG hardening round-1 (F-2). Low priority -- multi-module imports are uncommon in modern Python.
