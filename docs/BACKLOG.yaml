items:
  - key: LANG-DETECT-NODEJS-SHEBANG
    summary: "Detect nodejs interpreter in shebang patterns"
    type: task
    priority: low
    status: open
    size: XS
    section_id: coding_first
    labels: [mining, chunking]
    description: >
      SHEBANG_PATTERNS uses re.compile(r"node") with fullmatch(), which matches "node" exactly but not "nodejs". On Debian/Ubuntu systems the Node.js binary is named "nodejs", so #!/usr/bin/nodejs or #!/usr/bin/env nodejs returns "unknown" instead of "javascript". Deliverable: extend the node pattern to match both "node" and "nodejs" (e.g., r"nodejs?"). Acceptance criteria: (1) detect_language(Path("script"), "#!/usr/bin/nodejs\n") == "javascript"; (2) detect_language(Path("script"), "#!/usr/bin/env nodejs\n") == "javascript"; (3) existing tests unchanged; (4) ruff clean. Identified in CODE-LANG-DETECT harden round-1 (F-003).

    resolution: null
  - key: LANG-DETECT-GO-VAR-BODY
    summary: "Go var inside function bodies creates spurious chunk boundaries"
    type: task
    priority: low
    status: open
    size: S
    section_id: coding_first
    labels: [mining, chunking]
    description: >-
      GO_BOUNDARY includes var\s+\w+ which matches against stripped lines. Because chunk_code() strips lines before matching for Go/Python/Rust, any var declaration inside a function body (e.g., "    var result int") becomes a spurious chunk boundary, splitting mid-function. The adaptive merge step mitigates this for small fragments, but large Go functions with many var declarations produce unnecessarily granular chunks. Deliverable: either (a) restrict GO_BOUNDARY to top-level var only (remove var\s+\w+ — rely on var (\n  ...\n) block detection instead), or (b) track indentation in chunk_code() for Go. Option (a) is simpler but loses top-level single-var detection. The proper fix is tree-sitter (CODE-TREESITTER-EXPAND). Acceptance criteria: a Go function body containing "var x int" does not produce a split between the var line and surrounding code; existing Go boundary tests pass; ruff clean. Identified in CODE-LANG-DETECT harden round-1 (F-004).
    resolution: null
  - key: CODE-SMART-CHUNK-VAR-BOUNDARY
    summary: "Add non-exported var to TS_BOUNDARY in chunk_code()"
    type: task
    priority: low
    status: open
    size: S
    section_id: coding_first
    labels: [mining, chunking]
    description: >
      TS_BOUNDARY in miner.py detects exported var via the export branch but has no arm for top-level non-exported `var foo = ...`. Add `var\s+\w+\s*[:=]` to TS_BOUNDARY alongside the existing const/let arms. Acceptance criteria: a TS/JS file with a top-level non-exported var declaration produces a new chunk boundary at that var; existing tests unchanged; ruff clean. Low-priority since var is deprecated in modern TS/JS. Identified in CODE-SMART-CHUNK harden round-1 (F-004).

    resolution: null
  - key: STORE-BACKUP-RESTORE
    summary: "Palace backup and restore commands"
    type: feature
    priority: medium
    status: open
    size: M
    section_id: storage_reliability
    labels: [storage, cli]
    description: >-
      ## Scope


      Add `mempalace backup` and `mempalace restore` CLI commands. LanceDB's storage is directory-based — backup creates a tarball of the lance/ directory plus the SQLite knowledge graph. Restore extracts a tarball into the palace path.


      ## Acceptance criteria


      1. `mempalace backup [--palace PATH] [--out FILE]` creates a .tar.gz containing lance data + knowledge_graph.db + metadata.json

      2. metadata.json includes: drawer count, wing list, timestamp, mempalace version, backend type

      3. `mempalace restore FILE [--palace PATH]` extracts tarball into target palace path

      4. Restore to a non-empty palace path refuses unless `--force` is passed (prevents accidental overwrite)

      5. Round-trip test: backup → restore to new path → search returns same results

      6. ruff clean
    resolution: null
