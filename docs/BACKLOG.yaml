  - key: CLI-OPT-IN-VERSION-CHECK
    summary: Add opt-in periodic new-version checks
    type: feature
    status: open
    priority: medium
    section_id: future
    labels: [cli, install, privacy, network, ux]
    description: |-
      ## Problem
      Users do not currently get a lightweight way to discover that a newer
      `mempalace-code` release exists. A version check would be useful, but it must not
      undermine the project's offline/local-first claims or surprise automation with
      network calls or prompts.

      ## Scope
      - Add a strictly opt-in PyPI version check using package metadata only.
      - Do not add a pip install-time hook; Python package installers should not prompt.
        Treat "first install prompt" as the first interactive `mempalace-code` CLI run
        and document that installer scripts can only ask when stdin/stdout are real TTYs.
      - Ask once on an interactive TTY when no choice is recorded. Never prompt when stdin
        or stderr is not a TTY, when command output is likely to be redirected, or when an
        explicit env/config choice exists.
      - Store user choice and last-check state under `~/.mempalace/config.json` or a
        separate app-state file without clobbering existing config keys.
      - Default to no network until the user opts in. Failed checks should be quiet and
        rate-limited for automatic runs.
      - Add explicit controls, for example:
        - `mempalace-code version-check --enable`
        - `mempalace-code version-check --disable`
        - `mempalace-code version-check --status`
        - `mempalace-code version-check --check-now`
      - Add env overrides such as `MEMPALACE_VERSION_CHECK=1/0` and an interval override
        if the implementation uses periodic checks.
      - Update README, OFFLINE_USAGE, AGENT_INSTALL, and bootstrap/runbook wording so
        offline guarantees remain precise.

      ## Acceptance Criteria
      - Fresh non-interactive CLI commands never prompt and never check the network.
      - Fresh interactive CLI run asks once; yes enables checks, no records opt-out.
      - Opt-in automatic checks run no more often than the configured interval.
      - Explicit `--check-now` reports current/latest versions and clear network errors.
      - If a newer version is available, automatic output is a short stderr hint with an
        upgrade command; normal stdout output remains machine-parseable.
      - Config writes preserve existing user settings and malformed config behavior remains
        safe.
      - Tests cover prompt gating, enable/disable/status/check-now, interval throttling,
        network-error handling, update-available comparison, and non-TTY no-op behavior.
      - Docs explicitly state that the feature is opt-in and contacts PyPI only for package
        metadata.
    size: M
