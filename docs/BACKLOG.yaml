  - key: CORE-EXPORT-IMPORT-STREAM-TEST
    summary: 'Add test_export_streams_large_palace: verify iter_all streams without OOM on 5k-drawer palaces'
    type: task
    status: open
    priority: low
    size: S
    section_id: quality
    assignee: bot
    labels: [test, export, performance]
    description: |-
      ## Problem
      export.py exports via iter_all() which uses PyArrow batches — but there is no test that confirms the implementation does not inadvertently load all rows into memory at once on a large palace.

