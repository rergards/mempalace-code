  - key: STORE-CHROMA-DELETE-WING-LIMIT
    summary: Fix ChromaStore.delete_wing to use self.get() so the limit wrapper applies
    type: task
    status: open
    priority: low
    size: XS
    section_id: storage_reliability
    labels: [storage, chroma, cleanup]
