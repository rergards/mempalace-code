      - OR: iter_all batch count > 1 (proves batching is happening)
      - Must complete in < 30s in CI
      - No model loading required (mock or pre-built LanceDB table)

      ## Deliverable
      A test that seeds a synthetic 5k-drawer store, exports it, and asserts batch streaming is active via tracemalloc or batch-count instrumentation.

      ## Constraints
      - Deferred from CORE-EXPORT-IMPORT per plan (iter_all itself guarantees streaming; test is for regression protection)
      - Must not slow the test suite materially
