  - key: MINE-CSHARP-EXPR-BODY
    summary: C# expression-bodied properties not detected as boundaries or symbols
    type: feature
    status: open
    priority: low
    size: S
    section_id: coding_first
    labels: [feat, miner, csharp]
    description: |-
      ## Problem
      CSHARP_BOUNDARY and _CSHARP_EXTRACT property patterns both require a trailing `{` on the same line to detect auto-properties. C# expression-bodied properties use `=>` instead:

      ```csharp
      public int Count => _items.Count;
      public string Name => _name;
      ```

      These lines are treated as field-like and skipped. The chunk has no symbol label.

      ## Scope
      - Extend CSHARP_BOUNDARY property alternative to also match `=>` after the property name.
      - Extend the property pattern in _CSHARP_EXTRACT to match `=>` as an alternative to `{`.
      - Add tests for expression-bodied properties in both extract and chunking contexts.

      ## Acceptance Criteria
      - [ ] extract_symbol('public int Count => _items.Count;\n', 'csharp') returns ('Count', 'property')
      - [ ] chunk_code() creates a boundary at expression-bodied property declarations
      - [ ] Existing tests unaffected
