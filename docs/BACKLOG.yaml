    description: "## Problem\nSTORE-MIGRATE-CLI-TEST landed happy-path / VerificationError / --backup-dir / --force coverage but left three gaps:\n1. --verify=True is only tested implicitly via the default. No test exercises argparse store_true wiring for --verify.\n2. --embed-model VALUE passthrough is untested (defaults only).\n3. The RuntimeError handler in cmd_migrate_storage (mempalace_code/cli.py:526-528) is unreachable in tests — a regression that drops it would not be caught.\n\n## Scope\ntests/test_cli.py::TestMigrateStorageCommand — add three new tests. No production-code changes.\n\n## Deliverable\nThree tests in tests/test_cli.py::TestMigrateStorageCommand:\n- test_migrate_storage_cli_verify_passthrough — passes --verify, asserts mock kwarg verify=True.\n- test_migrate_storage_cli_embed_model_passthrough — passes --embed-model foo, asserts mock kwarg embed_model='foo'.\n- test_migrate_storage_cli_runtime_error_exits_1 — patches migrate to raise RuntimeError, asserts SystemExit.code==1 and 'Error:' on stderr.\n\n## Acceptance criteria\n- All three tests pass.\n- Tests assert on specific kwarg values (no 'mock was called' weak assertions).\n- Tests do not require chromadb installation.\n\n## Constraints\n- Mock at the same patch target as existing tests (mempalace_code.migrate.migrate_chroma_to_lance)."
