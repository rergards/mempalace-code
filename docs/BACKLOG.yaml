  - key: CI-CACHING-TEST-ENV-BRANCH
    summary: "Cover MEMPALACE_TEST_HF_HOME branch selection in offline test helpers"
    type: task
    status: open
    priority: low
    size: XS
    section_id: quality
    labels: [ci, test, devex]
    description: "## Problem\nThe test helpers in tests/test_offline.py and tests/test_e2e.py select between a CI-shared HuggingFace cache (MEMPALACE_TEST_HF_HOME) and a tmp_path-isolated cache. Branch selection is wired but not directly unit-tested; only the integration end-to-end path on workflow_dispatch exercises it.\n\n## Scope\ntests/test_offline.py and/or tests/test_e2e.py — add a focused test that exercises both branches without performing a real model download.\n\n## Deliverable\nA small unit test (or parametrized helper test) that asserts:\n- When MEMPALACE_TEST_HF_HOME is set, HF_HOME is monkeypatched to that exact value and no tmp_path subdirectory is created.\n- When MEMPALACE_TEST_HF_HOME is unset, a fresh tmp_path/hf directory is created and HF_HOME is set to it.\n\n## Acceptance criteria\n- New test asserts both branches without requiring a model download (mock fetch_model or short-circuit before the SentenceTransformer call).\n- Test runs under the default 'not needs_network' filter.\n- Ruff clean.\n\n## Constraints\n- No new helper file unless strictly required; prefer fixtures in the existing test modules."
