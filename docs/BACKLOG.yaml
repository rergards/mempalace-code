items:
  - key: STORAGE-LANCE-STALE-FRAGMENT-CLEANUP
    summary: Reclaim stale LanceDB fragments after optimize without unsafe manual deletion
    type: bug
    status: open
    priority: highest
    size: M
    section_id: storage_reliability
    labels: [storage, lancedb, cleanup, disk, reliability]
    description: |-
      ## Symptom

      A live palace with 32,582 drawers had only one current Lance fragment
      (`total_files_size` about 117M) but occupied 61G on disk because 3,759 old
      table versions retained 1,188 stale data files and 1,996 deletion files.
      `safe_optimize()` calls `Table.optimize()` with default cleanup behavior,
      which preserves recent files; the installed runtime also lacked the
      `pylance`/`lance` module needed for explicit `cleanup_old_versions()`.

      ## Steps to reproduce

      1. Repeatedly mine or watch a changing multi-repo parent directory so
         LanceDB accumulates many recent table versions.
      2. Run `mempalace status` and confirm live rows are readable.
      3. Compare Lance metadata `total_files_size` for the latest version with
         `du -sh <palace>/lance/mempalace_drawers.lance`.

      Current behavior: the live table can be about 117M while the on-disk Lance
      directory is tens of gigabytes, and normal optimize does not reclaim it.

      ## Scope

      - Add a supported cleanup path for stale Lance versions/fragments after
        successful optimize, with conservative defaults and explicit unsafe-now
        controls for known-no-writer maintenance.
      - Ensure the runtime dependency needed by Lance cleanup is packaged or the
        command fails with a clear actionable error.
      - Report live table bytes, on-disk table bytes, version count, data-file
        count, and estimated reclaimable bytes in health/status output.
      - Preserve current rows and current version; never instruct users to
        delete files under `.lance/data` manually.

      ## Acceptance Criteria

      1. A CLI or library cleanup command can reduce a test Lance table with
         stale versions while preserving row count and current reads.
      2. `safe_optimize()` or the new cleanup command passes configurable
         cleanup retention values to LanceDB and tests assert those parameters.
      3. Missing cleanup dependency produces a specific install/extra hint, not
         a raw `ModuleNotFoundError`.
      4. `mempalace status` or `mempalace health` shows logical table size versus
         on-disk size and version/file counts.
      5. Focused storage tests and Ruff pass.
  - key: BACKUP-RETENTION-DISK-GUARDS
    summary: Enforce backup retention and disk-space guards for scheduled and pre-optimize backups
    type: bug
    status: open
    priority: highest
    size: M
    section_id: storage_reliability
    labels: [backup, retention, disk, launchd, reliability]
    description: |-
      ## Symptom

      `~/.mempalace/backups` grew to 149G across 29 full tarballs. Scheduled
      backups had no effective retention, and pre-optimize backups copied a
      bloated Lance table before cleanup. During the incident, deleting older
      archives and keeping only the newest scheduled backup reclaimed about
      128G immediately.

      ## Steps to reproduce

      1. Enable a scheduled backup launchd/cron job.
      2. Run repeated mine/watch cycles against a palace whose Lance table has
         stale retained fragments.
      3. Inspect `~/.mempalace/backups` with `du -sh` and `ls -lhtr`.

      Current behavior: scheduled and pre-optimize archives can grow without a
      retention cap and can copy already-bloated Lance storage.

      ## Scope

      - Apply retention to scheduled, manual, and pre-optimize backup archives,
        not only `pre_optimize_*.tar.gz`.
      - Add disk-space guards before creating a full tarball, with a clear
        message when the projected backup would leave too little free space.
      - Make `backup list` show total bytes by kind and flag oversized/stale
        archives.
      - Update launchd/cron schedule output so scheduled backups invoke the same
        retention path.

      ## Acceptance Criteria

      1. Creating a scheduled backup prunes older scheduled backups according to
         configured retention.
      2. Pre-optimize backups cannot accumulate unbounded archives across repeated
         mine/watch cycles.
      3. Backup creation refuses or warns before consuming disk below a configured
         free-space threshold.
      4. Tests cover retention across backup kinds and disk-guard behavior.
      5. README/docs describe the default retention and emergency cleanup path.
  - key: WATCHER-DISK-BUDGET-GUARD
    summary: Add disk-budget and cleanup guardrails to long-running watch daemons
    type: bug
    status: open
    priority: high
    size: S
    section_id: storage_reliability
    labels: [watcher, launchd, disk, mining, reliability]
    description: |-
      ## Symptom

      `com.mempalace.watch` was running `mempalace watch /Users/rerg/dev` as a
      LaunchAgent while the disk was 98% full. The watcher can keep generating
      Lance versions and trigger optimize/backup behavior during active
      development or autopilot runs, making storage growth look spontaneous.

      ## Steps to reproduce

      1. Install the watch LaunchAgent for a busy parent directory.
      2. Let autopilot or normal development create commits/changes across
         initialized repos.
      3. Inspect `launchctl print gui/$UID/com.mempalace.watch` and palace disk
         size while the daemon is running.

      Current behavior: the daemon keeps running under low disk conditions and
      has no disk-budget gate before additional mine/optimize/backup work.

      ## Scope

      - Before each watch re-mine/optimize cycle, check palace/backups size and
        free disk budget.
      - Pause or skip non-essential optimize/backup work when disk is below the
        configured threshold, while logging an actionable message.
      - Add a `watch status` or health note that identifies active launchd
        watcher state and the watched root.
      - Keep MCP read/search behavior independent from the watcher being paused.

      ## Acceptance Criteria

      1. Watcher tests cover low-disk skip behavior without requiring a real
         full disk.
      2. A running watch daemon does not create a full backup when free space is
         below the configured threshold.
      3. Status/health output identifies configured watch launch agent state when
         available on macOS.
      4. Docs explain how to pause/re-enable the watcher safely.
      5. Ruff and focused watcher tests pass.
  - key: MCP-REQUEST-COMPAT-UPSTREAM
    summary: Harden MCP request handling using upstream compatibility fixes as examples
    type: bug
    status: open
    priority: high
    size: S
    section_id: mcp_developer_tools
    labels: [mcp, compatibility, upstream, hardening]
    description: |-
      ## Symptom

      Upstream vanilla MemPalace fixed several MCP protocol compatibility edges
      after this fork split. Our state is too different for a direct port, but
      the behavior is relevant to `mempalace-code`:

      - `handle_request()` crashes when a client sends `tools/call` with
        `"arguments": null`.
      - Extra client arguments such as Gemini-style `wait_for_previous` reach
        handlers and produce internal tool errors.
      - Unknown `notifications/*` methods return errors instead of being ignored
        as notifications.

      These were reproduced locally against `mempalace_code.mcp_server`.

      ## Steps to reproduce

      Run a tiny Python snippet that calls `handle_request()` with:

      1. `{"method": "tools/call", "params": {"name": "mempalace_status", "arguments": null}}`
      2. `{"method": "tools/call", "params": {"name": "mempalace_status", "arguments": {"wait_for_previous": false}}}`
      3. `{"method": "notifications/cancelled", "params": {}}`

      Current behavior: case 1 raises `AttributeError`, case 2 returns an
      internal tool error, and case 3 returns an unknown-method response.

      ## Scope

      - Treat missing/null tool arguments as `{}` before type coercion.
      - Drop known client compatibility noise arguments that are not in the
        selected tool schema.
      - Return no response for `notifications/*` methods.
      - Keep the current `mempalace-code` server/tool names unchanged.

      ## Acceptance Criteria

      1. `tools/call` with `"arguments": null` succeeds for an argument-free
         tool such as `mempalace_status`.
      2. `tools/call` with `wait_for_previous` on a normal tool does not produce
         an internal tool error.
      3. Unknown `notifications/*` methods return `None` / no JSON-RPC response.
      4. Existing MCP request tests still pass.
      5. Ruff clean.
  - key: READ-PATH-NONE-METADATA-HARDEN
    summary: Tolerate None documents and metadata on search and graph read paths
    type: bug
    status: open
    priority: high
    size: S
    section_id: storage_reliability
    labels: [search, graph, robustness, upstream, migration]
    description: |-
      ## Symptom

      Upstream hardened read paths for palaces that contain rows with missing
      documents or metadata. LanceDB should normally preserve metadata, but
      `mempalace-code` can still see bad rows via legacy Chroma imports,
      partial/corrupt data, or direct store manipulation.

      ## Steps to reproduce

      Use small fake stores or monkeypatches that return valid result rows mixed
      with `None` metadata/documents:

      - `search_memories()` crashes when one result metadata entry is `None`.
      - `palace_graph.build_graph()` crashes when one batch metadata entry is
        `None`.

      ## Scope

      - Treat `None` metadata as an empty dict on search result rendering.
      - Treat `None` documents as empty text where ranking/rendering needs a
        string.
      - Skip `None` metadata rows in `build_graph()` rather than failing the
        entire graph/tunnel request.
      - Add small tests with fake stores; do not require corrupt LanceDB fixtures.

      ## Acceptance Criteria

      1. `search_memories()` returns sentinel metadata values instead of raising
         on `None` metadata.
      2. `code_search()` handles `None` metadata/doc rows without raising.
      3. `palace_graph.build_graph()` skips `None` metadata rows.
      4. Relevant search and graph tests pass.
      5. Ruff clean.
  - key: CONVO-NORMALIZE-GEMINI-CLAUDE-TOOLS
    summary: Extend conversation normalization with Gemini CLI and Claude Code tool-block cleanup
    type: feature
    status: open
    priority: medium
    size: M
    section_id: cleanup
    labels: [conversation, normalize, gemini, claude-code, upstream]
    description: |-
      ## Problem

      Upstream vanilla MemPalace added Gemini CLI JSONL support and improved
      Claude Code JSONL cleanup/tool-block formatting. Our normalizer supports
      Claude.ai JSON, ChatGPT JSON, Claude Code JSONL, Codex JSONL, Slack JSON,
      and plain text, but not Gemini CLI JSONL.

      Direct port is not appropriate because this fork keeps different package
      names, spellcheck behavior, and conversation-mining priorities. Use
      upstream as an example only.

      ## Scope

      - Add a local Gemini CLI JSONL parser for the current Gemini CLI transcript
        shape.
      - Preserve existing Codex JSONL and spellcheck behavior.
      - Improve Claude Code JSONL handling for tool_use/tool_result blocks and
        line-anchored system/hook noise, without deleting user prose.
      - Update module docs/tests for supported formats.

      ## Acceptance Criteria

      1. Gemini CLI JSONL fixture normalizes into `> user` / assistant-style
         transcript text.
      2. Claude Code tool_use/tool_result blocks are represented compactly and
         deterministically.
      3. Noise stripping is line/tag anchored and cannot eat neighboring user
         content.
      4. Existing normalize tests still pass.
      5. Ruff clean.
  - key: SEARCH-HYBRID-RERANK-EVAL
    summary: Evaluate BM25 plus vector reranking for code and project-file retrieval
    type: task
    status: open
    priority: medium
    size: M
    section_id: quality
    labels: [search, benchmark, retrieval, upstream, bm25]
    description: |-
      ## Problem

      Upstream vanilla MemPalace added BM25 + vector hybrid reranking. Our fork's
      current .NET benchmark misses include exact-ish project dependency queries
      where README/generated files outrank `.csproj` project files. BM25 may help,
      but this fork has LanceDB, code metadata, and benchmark constraints that
      differ from upstream, so the upstream implementation should be treated as
      an example, not a direct port.

      This item is separate from the currently-running
      `BENCH-DOTNET-R5-IMPROVE`; close or narrow it if that task already lands an
      equivalent measured solution.

      ## Scope

      - Prototype BM25 or metadata-aware reranking on top of current LanceDB
        candidate retrieval.
      - Measure impact on `benchmarks/dotnet_bench.py`, especially the
        `project_dependency` category.
      - Avoid hard-coding expected benchmark filenames.
      - Decide whether the reranker belongs in general search, `code_search`,
        benchmark-only experiment code, or not at all.

      ## Acceptance Criteria

      1. Benchmark before/after output is recorded.
      2. Any production reranker has focused tests for exact-token boosts and
         `None` document safety.
      3. Reranking does not regress existing search/code_search tests.
      4. If no production change is kept, document why and close the item with
         measured evidence.
      5. Ruff clean.
  - key: CODE-TREESITTER-GO-RUST-DETACH-TEST
    summary: Add negative tests for detached-comment gap detection in Go and Rust AST chunkers
    type: task
    status: open
    priority: low
    size: S
    section_id: coding_first
    labels: [testing, chunking, ast, go, rust]
    description: |-
      ## Problem

      _chunk_go_treesitter and _chunk_rust_treesitter use a blank-line gap check (b'\n\n' in source_bytes[prev.end_byte:next_sibling.start_byte]) to decide whether a leading comment/attribute is attached to the following declaration. The existing tests only verify the POSITIVE case (comment IS attached). There is no test asserting that a comment separated by a blank line is NOT absorbed into the following declaration's chunk.

      Without a negative test, removing the gap check would not break any existing assertion. This is the same gap identified in CODE-TREESITTER-PYTHON-DETACH-TEST for Python.

      ## Scope
      tests/test_chunking.py — add negative AST chunking tests for Go and Rust detached comments, with fixtures large enough to avoid adaptive merge masking the assertion.

      ## Deliverable

      Add two test functions to tests/test_chunking.py:
      1. test_ast_go_detached_comment_not_absorbed — uses GO_AST_COMMENT_ATTACHED fixture, asserts that the chunk containing 'func standalone' does NOT contain 'Detached comment'.
      2. test_ast_rust_detached_comment_not_absorbed — uses RUST_AST_ATTRIBUTE_ATTACHED fixture, asserts that the chunk containing 'fn default_config' does NOT contain 'Standalone comment'.

      Both tests require large enough function bodies that adaptive_merge_split does not merge them. May need fixture extensions (>=400 char bodies) similar to the approach planned for CODE-TREESITTER-PYTHON-DETACH-TEST.

      ## Acceptance Criteria

      1. test_ast_go_detached_comment_not_absorbed passes when tree-sitter-go is installed
      2. test_ast_rust_detached_comment_not_absorbed passes when tree-sitter-rust is installed
      3. Both tests skip when the respective grammar is absent
      4. Both tests would FAIL if the b'\n\n' gap check were removed from the respective chunker
      5. ruff clean

      Identified in CODE-TREESITTER-EXPAND harden round-1 (F-2).
    links:
      - type: is-blocked-by
        key: CLARIFY-CODE-TREESITTER-GO-RUST-DETACH-TEST
