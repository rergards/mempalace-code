      ## Acceptance criteria
      - CI caches pip packages.
      - CI caches the HuggingFace model directory when model-backed tests run.
      - Cold-cache runtime stays under 10 minutes for the main job.
      - Warm-cache runtime stays under 3 minutes for the main job, or the observed runtime is documented if the hosted runner is slower.
    resolution: null
  - key: STORE-CHROMA-COUNTBY-FALLBACK
    summary: "ChromaStore.count_by/count_by_pair silently return empty when deprecated ChromaDB backend is used"
    type: bug
    status: open
    priority: low
    size: S
    section_id: storage_reliability
    labels: [storage, chroma, hardening]
    description: |-
      ## Symptom
      ChromaDB palaces can silently report empty wings and rooms even though drawers exist.

      ## Steps to reproduce
      1. Open a deprecated ChromaDB-backed palace with drawers across multiple wings.
      2. Call `tool_list_wings`, `tool_list_rooms`, `tool_get_taxonomy`, or `tool_status`.
      3. Observe `wings={}` or `rooms={}` because ChromaStore.count_by/count_by_pair are not implemented and MCP aggregation failures are swallowed.

      ## Acceptance criteria
      - Implement a get-and-iterate fallback for ChromaStore.count_by/count_by_pair using `self.get(include=["metadatas"], limit=self.count())`.
      - `tool_list_wings` on a ChromaDB palace with N drawers across M wings returns all M wings.
      - `tool_list_rooms` and taxonomy return non-empty counts for ChromaDB palaces.
      - The fix is documented as a stop-gap for the deprecated ChromaDB backend.
    resolution: null
  - key: MINE-LANCE-VECTOR-SCAN
    summary: get_source_files() loads full table including vector column before projecting to two columns
    type: bug
    status: open
    priority: low
    size: S
    section_id: storage_reliability
    labels: [mining, performance, storage]
    description: |-
      ## Symptom
      LanceStore metadata scans materialize the vector column before projecting it away, wasting memory and I/O on large palaces.

      ## Steps to reproduce
      1. Seed a LanceDB palace with thousands of drawers.
      2. Call `get_source_files()`, `get_source_file_hashes()`, `count_by()`, or `count_by_pair()`.
      3. Profile the call and observe full-table materialization including vectors before `.select(...)` discards them.

      ## Acceptance criteria
      - `get_source_files()` and `get_source_file_hashes()` use a column-projected LanceDB scan.
      - `count_by()` and `count_by_pair()` use the same projection-safe approach.
      - A 5,000-drawer table metadata scan reads less than 1 MB of non-required data, or the profiler evidence is documented.
      - All existing tests pass and ruff is clean.
